version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://careflow:careflow@db:5432/careflow
      - SECRET_KEY=change-this-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: careflow
      POSTGRES_PASSWORD: careflow
      POSTGRES_DB: careflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
